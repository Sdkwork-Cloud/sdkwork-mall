name: Package Mall PC

on:
  push:
    tags:
      - v*
      - "*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or source ref to package.
        required: true
        default: v0.1.0
      package_version:
        description: Package version used in artifact names and manifests.
        required: true
        default: 0.1.0
      platform:
        description: Platform filter.
        required: true
        default: all
      architecture:
        description: Architecture filter.
        required: true
        default: all
      profile:
        description: Runtime profile filter.
        required: true
        default: all
      variant:
        description: Package variant filter.
        required: true
        default: all
      format:
        description: Package format filter.
        required: true
        default: all
      deploy:
        description: Run configured deployment environments after packaging.
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  package:
    uses: Sdkwork-Cloud/sdkwork-github-workflow/.github/workflows/sdkwork-package.yml@v1
    with:
      config_path: sdkwork.workflow.json
      tag: ${{ github.event.inputs.tag || github.event.release.tag_name || github.ref_name }}
      package_version: ${{ github.event.inputs.package_version || github.event.release.tag_name || github.ref_name }}
      platform: ${{ github.event.inputs.platform || 'all' }}
      architecture: ${{ github.event.inputs.architecture || 'all' }}
      profile: ${{ github.event.inputs.profile || 'all' }}
      variant: ${{ github.event.inputs.variant || 'all' }}
      format: ${{ github.event.inputs.format || 'all' }}
      publish_release: true
      upload_artifact: true
      deploy: ${{ github.event.inputs.deploy == 'true' || github.event_name == 'release' }}
      retention_days: 30
      framework_ref: v1
      dependency_refs_json: >-
        {
          "SDKWORK_COMMERCE_REF": "${{ vars.SDKWORK_COMMERCE_REF }}",
          "SDKWORK_APPBASE_REF": "${{ vars.SDKWORK_APPBASE_REF }}",
          "SDKWORK_UI_REF": "${{ vars.SDKWORK_UI_REF }}",
          "SDKWORK_SDK_COMMONS_REF": "${{ vars.SDKWORK_SDK_COMMONS_REF }}",
          "SDKWORK_UTILS_REF": "${{ vars.SDKWORK_UTILS_REF }}",
          "SDKWORK_CORE_REF": "${{ vars.SDKWORK_CORE_REF }}"
        }
    secrets: inherit
