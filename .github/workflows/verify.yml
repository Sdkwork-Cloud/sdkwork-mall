name: Verify Mall Workspace

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sdkwork-mall
    steps:
      - name: Checkout mall
        uses: actions/checkout@v4
        with:
          path: sdkwork-mall

      - name: Checkout commerce foundation
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-commerce
          path: sdkwork-commerce
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Checkout appbase
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-appbase
          path: sdkwork-appbase
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Checkout UI
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-ui
          path: sdkwork-ui
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Checkout SDK commons
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-sdk-commons
          path: sdkwork-sdk-commons
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Checkout utils
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-utils
          path: sdkwork-utils
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: Sdkwork-Cloud/sdkwork-core
          path: sdkwork-core
          token: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm run verify
